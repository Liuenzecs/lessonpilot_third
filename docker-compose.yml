version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lessonpilot
      POSTGRES_USER: lessonpilot
      POSTGRES_PASSWORD: lessonpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lessonpilot -d lessonpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://lessonpilot:lessonpilot@postgres:5432/lessonpilot
      JWT_SECRET: replace-me
      JWT_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: http://localhost:5173
      LLM_PROVIDER: fake
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres-data:

